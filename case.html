<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Case study — Ajeet</title>
<meta name="description" content="Case study — product design work by Ajeet.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
<style>
  :root {
    --font: 'Sora', -apple-system, sans-serif;
    --ink-dark: #1c2b3a;
    --ink-soft: rgba(28, 43, 58, 0.72);
    --ink-faint: rgba(28, 43, 58, 0.5);
    --accent: #2f7fd4;
    --rule: rgba(28, 43, 58, 0.12);
    --page: #f7f9fc;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: var(--font); background: var(--page); color: var(--ink-dark);
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  .wrap { width: min(92vw, 1080px); margin: 0 auto; }
  .narrow { width: min(92vw, 760px); margin: 0 auto; }

  /* ── top bar: project name + the × back to the journey ─────────────────── */
  .cs-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px clamp(16px, 3vw, 32px);
    background: rgba(247, 249, 252, 0.82);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border-bottom: 1px solid transparent;
    transition: border-color .3s ease;
  }
  .cs-bar.stuck { border-bottom-color: var(--rule); }
  .cs-bar .who { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
  .cs-bar .who .mark {
    width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    color: #fff; font-size: 14px; font-weight: 800; letter-spacing: -0.02em;
  }
  .cs-bar .who .sep { color: var(--ink-faint); font-weight: 400; }
  .cs-bar .who .proj { color: var(--ink-soft); font-weight: 500; }
  .cs-close {
    width: 42px; height: 42px; border: 1px solid var(--rule); border-radius: 999px;
    background: #fff; cursor: pointer; display: grid; place-items: center; color: var(--ink-dark);
    transition: transform .35s cubic-bezier(.2,.9,.25,1), background .25s ease;
    text-decoration: none;
  }
  .cs-close:hover { background: var(--ink-dark); color: #fff; transform: rotate(90deg); }
  .cs-close svg { width: 17px; height: 17px; }

  /* ── hero ──────────────────────────────────────────────────────────────── */
  .cs-hero { padding: clamp(100px, 13vh, 140px) 0 clamp(32px, 5vh, 54px); text-align: center; }
  .cs-hero .badge {
    display: inline-grid; place-items: center; width: 54px; height: 54px; border-radius: 16px;
    color: #fff; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 26px;
    box-shadow: 0 14px 34px -14px rgba(15, 30, 50, 0.55);
  }
  .cs-hero h1 {
    font-size: clamp(30px, 4.4vw, 52px); font-weight: 800; letter-spacing: -0.04em;
    line-height: 1.08; margin: 0 auto 18px; max-width: 18ch;
  }
  .cs-hero .sub { font-size: clamp(14px, 1.5vw, 17px); line-height: 1.6; color: var(--ink-soft); margin: 0 auto; max-width: 62ch; }

  /* meta row — role / timeline / team / platform */
  .cs-meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(16px, 3vw, 40px);
    padding: clamp(20px, 2.6vw, 28px) 0; margin-top: clamp(24px, 3vw, 36px);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    text-align: left;
  }
  .cs-meta dt { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 8px; }
  .cs-meta dd { margin: 0; font-size: clamp(14px, 1.4vw, 16px); font-weight: 600; line-height: 1.5; }

  /* ── image placeholders — swap each .shot for <img class="shot" src="…"> ─ */
  .shot {
    width: 100%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);
    display: grid; place-items: center; overflow: hidden; object-fit: cover;
    aspect-ratio: 16 / 9;
    box-shadow: 0 30px 70px -40px rgba(15, 30, 50, 0.5);
  }
  div.shot::after {
    content: attr(data-n); font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.9); text-align: center; padding: 0 20px;
  }
  .shot.tall { aspect-ratio: 4 / 3; }
  .shot.bleed { border-radius: 24px; }
  .g1 { background: linear-gradient(135deg, #ffd8a6, #ff9d6c 55%, #f76b8a); }
  .g2 { background: linear-gradient(135deg, #a6d8ff, #6c9dff 55%, #7b6bf7); }
  .g3 { background: linear-gradient(135deg, #c3f0c8, #6cc9a4 55%, #3f9d8a); }
  .g4 { background: linear-gradient(135deg, #e8d5ff, #b98cf5 55%, #8a6bf7); }
  .g5 { background: linear-gradient(135deg, #cfe0f2, #8fa9c6 55%, #5b7796); }

  /* ── section nav: sticks under the top bar, underline marks the section ── */
  .secnav {
    position: sticky; z-index: 15; top: 0;
    background: rgba(247, 249, 252, 0.88);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    padding-top: 16px;
  }
  .secnav .wrap { display: grid; grid-auto-flow: column; grid-auto-columns: 1fr; gap: clamp(16px, 3vw, 40px); }
  .secnav a {
    display: block; min-width: 0; text-decoration: none; color: var(--ink-dark);
    padding-bottom: 14px; border-bottom: 3px solid var(--rule);
    transition: border-color .35s ease;
  }
  .secnav a b { display: block; font-size: 14px; font-weight: 700; letter-spacing: -0.01em; }
  .secnav a span {
    display: block; margin-top: 3px; font-size: 13px; color: var(--ink-soft);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .secnav a:hover { border-bottom-color: var(--ink-faint); }
  .secnav a.on { border-bottom-color: var(--ink-dark); }
  #cs section { scroll-margin-top: 160px; }

  /* ── sections ──────────────────────────────────────────────────────────── */
  section { padding: clamp(40px, 6vh, 68px) 0; }
  .kicker {
    font-size: 11px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 14px;
  }
  h2 {
    font-size: clamp(24px, 3vw, 34px); font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.16; margin: 0 0 18px; max-width: 24ch;
  }
  h3 { font-size: clamp(18px, 1.9vw, 22px); font-weight: 700; letter-spacing: -0.025em; margin: 0 0 10px; }
  p { font-size: clamp(14px, 1.45vw, 16px); line-height: 1.7; color: var(--ink-soft); margin: 0 0 16px; }
  p:last-child { margin-bottom: 0; }
  p strong { font-weight: 600; color: var(--ink-dark); }
  .step { margin-top: clamp(36px, 5vw, 56px); }
  .figure { margin: clamp(18px, 2.4vw, 28px) 0 0; }

  /* horizontal challenge — copy left, image right */
  .ch-split {
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1.15fr);
    gap: clamp(28px, 4.5vw, 60px); align-items: stretch;
  }
  .ch-split .figure { margin-top: 0; display: flex; flex-direction: column; }
  .ch-split .shot { flex: 1; aspect-ratio: auto; min-height: 320px; }
  .wide-copy { max-width: 760px; }
  .figure figcaption { font-size: 13px; color: var(--ink-faint); margin-top: 12px; text-align: center; }

  /* how-might-we cards */
  .hmw { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(12px, 1.6vw, 18px); margin-top: clamp(22px, 2.8vw, 32px); }
  .hmw-card {
    background: #fff; border: 1px solid var(--rule); border-radius: 18px;
    padding: clamp(18px, 2.2vw, 24px);
  }
  .hmw-card .n { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: var(--accent); }
  .hmw-card h3 { font-size: clamp(15px, 1.6vw, 17px); line-height: 1.4; margin: 10px 0 8px; }
  .hmw-card p { font-size: 13px; line-height: 1.6; margin: 0; }
  .ap-outro { max-width: 720px; margin-top: clamp(22px, 2.8vw, 32px); }
  .ap-outro p { font-size: 14px; font-weight: 400; line-height: 1.7; }

  /* problem walkthroughs inside the approach */
  .prob { margin-top: clamp(44px, 5.5vw, 68px); }
  .prob-h {
    font-size: clamp(20px, 2.4vw, 27px); font-weight: 800; letter-spacing: -0.03em;
    margin: 0 0 16px;
  }
  .prob-h span { color: var(--accent); margin-right: 12px; }

  /* ── solution blocks: copy, image rows, insight + result callouts ───────── */
  .wide-copy p { max-width: 720px; }
  .shot-row { display: grid; gap: clamp(12px, 1.6vw, 18px); margin-bottom: clamp(22px, 2.8vw, 32px); }
  .shot-row.n2 { grid-template-columns: repeat(2, 1fr); }
  .shot-row.n3 { grid-template-columns: repeat(3, 1fr); }
  .shot-row.n1 .shot { aspect-ratio: 2 / 1; }
  .shot-row.n2 .shot { aspect-ratio: 3 / 2; }
  .insight {
    max-width: 720px; margin: clamp(20px, 2.6vw, 28px) 0;
    border-left: 3px solid var(--accent); background: #fff;
    border-radius: 0 16px 16px 0;
    padding: clamp(16px, 2vw, 22px) clamp(18px, 2.4vw, 26px);
    font-size: clamp(15px, 1.7vw, 18px); line-height: 1.55; color: var(--ink-soft);
    box-shadow: 0 18px 40px -30px rgba(15, 30, 50, 0.35);
  }
  .insight strong { color: var(--ink-dark); font-weight: 700; }
  .bq {
    max-width: 700px; margin: clamp(18px, 2.4vw, 26px) 0;
    padding: 2px 0 2px 20px; border-left: 3px solid var(--rule);
    font-style: italic; color: var(--ink-soft);
    font-size: clamp(15px, 1.6vw, 17px); line-height: 1.65;
  }
  .bq cite { display: block; margin-top: 8px; font-style: normal; font-size: 12px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); }
  .blist { max-width: 720px; margin: 0 0 16px; padding-left: 22px; color: var(--ink-soft); font-size: clamp(14px, 1.45vw, 16px); line-height: 1.7; }
  .blist li { margin-bottom: 6px; }
  .blist li::marker { color: var(--accent); }
  .result-card {
    max-width: 720px; margin-top: clamp(22px, 2.8vw, 32px);
    background: var(--ink-dark); color: #fff; border-radius: 18px;
    padding: clamp(18px, 2.4vw, 26px);
  }
  .result-card .rk { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255, 255, 255, 0.6); }
  .result-card p { margin: 8px 0 0; color: rgba(255, 255, 255, 0.85); font-size: clamp(14px, 1.45vw, 16px); }
  .result-card strong { color: #fff; font-weight: 700; }
  .result-card .rrow { display: flex; flex-wrap: wrap; gap: 10px clamp(20px, 3.4vw, 48px); margin-top: 10px; }
  .result-card .rrow span { font-size: clamp(14px, 1.5vw, 16px); font-weight: 700; color: #fff; white-space: nowrap; }

  /* three friction callouts */
  .callouts { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(12px, 1.6vw, 20px); margin-top: clamp(24px, 3vw, 34px); }
  .callout {
    background: #fff; border: 1px solid var(--rule); border-radius: 18px;
    padding: clamp(20px, 2.4vw, 28px);
  }
  .callout b { display: block; font-size: clamp(24px, 2.8vw, 34px); font-weight: 800; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 8px; }
  .callout span { font-size: 14px; line-height: 1.6; color: var(--ink-soft); }

  /* pull quote */
  .quote { padding: clamp(50px, 8vh, 90px) 0; text-align: center; }
  .quote blockquote {
    margin: 0 auto; max-width: 22ch;
    font-size: clamp(26px, 4vw, 48px); font-weight: 700; letter-spacing: -0.035em; line-height: 1.2;
  }
  .quote cite { display: block; margin-top: 22px; font-size: 13px; font-style: normal; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }

  /* the four-step flow */
  .flow { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(10px, 1.4vw, 16px); margin-top: clamp(24px, 3vw, 36px); }
  .flow .shot { aspect-ratio: 3 / 4; border-radius: 16px; }
  .flow p { font-size: 13px; font-weight: 600; color: var(--ink-dark); margin: 12px 0 0; text-align: center; }
  .flow p span { display: block; font-weight: 400; color: var(--ink-faint); font-size: 12px; margin-top: 2px; }

  /* outcome cards */
  .outcomes { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(12px, 1.6vw, 20px); margin-top: clamp(28px, 3.4vw, 40px); }
  .outcome {
    background: #fff; border: 1px solid var(--rule); border-radius: 20px; padding: clamp(22px, 2.4vw, 30px);
    transition: transform .4s cubic-bezier(.2,.9,.25,1), box-shadow .4s ease;
  }
  .outcome:hover { transform: translateY(-4px); box-shadow: 0 24px 50px -30px rgba(15, 30, 50, 0.5); }
  .outcome .stat { font-size: clamp(24px, 2.6vw, 32px); font-weight: 800; letter-spacing: -0.03em; margin: 0 0 10px; }
  .outcome h3 { font-size: 16px; margin: 0 0 6px; }
  .outcome p { font-size: 14px; line-height: 1.6; margin: 0; }

  /* ── footer: next project + back ────────────────────────────────────────── */
  .cs-foot { border-top: 1px solid var(--rule); padding: clamp(28px, 4vh, 44px) 0; }
  .cs-foot .lead { font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 14px; }
  .next {
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    text-decoration: none; color: var(--ink-dark);
    padding: clamp(22px, 3vw, 34px); border-radius: 24px; background: #fff;
    border: 1px solid var(--rule);
    transition: transform .4s cubic-bezier(.2,.9,.25,1), box-shadow .4s ease;
  }
  .next:hover { transform: translateY(-3px); box-shadow: 0 24px 50px -30px rgba(15, 30, 50, 0.5); }
  .next .t { font-size: clamp(20px, 2.4vw, 30px); font-weight: 800; letter-spacing: -0.03em; }
  .next .o { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .next svg { width: 22px; height: 22px; flex: none; transition: transform .35s cubic-bezier(.2,.9,.25,1); }
  .next:hover svg { transform: translateX(4px); }
  .cs-foot .home { display: block; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink-faint); text-decoration: none; }
  .cs-foot .home:hover { color: var(--ink-dark); }

  /* reveals */
  .rv { opacity: 0; transform: translateY(28px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .rv.in { opacity: 1; transform: none; }

  /* ── password gate ─────────────────────────────────────────────────────── */
  #gate { position: fixed; inset: 0; z-index: 15; display: grid; place-items: center; background: var(--page); padding: 20px; }
  #gate[hidden] { display: none; }
  .gate-card {
    width: min(92vw, 420px); background: #fff; border: 1px solid var(--rule); border-radius: 26px;
    padding: clamp(30px, 5vw, 44px); text-align: center;
    box-shadow: 0 30px 70px -40px rgba(15, 30, 50, 0.45);
  }
  .gate-card .lock {
    width: 54px; height: 54px; margin: 0 auto 20px; border-radius: 16px;
    display: grid; place-items: center; background: var(--ink-dark); color: #fff;
  }
  .gate-card .lock svg { width: 22px; height: 22px; }
  .gate-card h1 { font-size: clamp(20px, 2.4vw, 24px); font-weight: 800; letter-spacing: -0.03em; margin: 0 0 10px; }
  .gate-card > p { font-size: 14px; line-height: 1.65; margin: 0 0 24px; }
  .gate-row { display: flex; gap: 10px; }
  .gate-row input {
    flex: 1; min-width: 0; font: 600 15px var(--font); color: var(--ink-dark);
    padding: 13px 16px; border: 1px solid var(--rule); border-radius: 14px;
    background: var(--page); outline: none; transition: border-color .25s ease;
  }
  .gate-row input:focus { border-color: var(--accent); }
  .gate-row button {
    flex: none; width: 48px; height: 48px; border: 0; border-radius: 14px;
    background: var(--ink-dark); color: #fff; cursor: pointer; display: grid; place-items: center;
    transition: background .25s ease;
  }
  .gate-row button:hover { background: var(--accent); }
  .gate-row button svg { width: 18px; height: 18px; }
  /* meme security check — EXPERIMENT: delete this block (and the .gate-meme div) to revert */
  .gate-card .lock { display: none; }
  .gate-meme {
    position: relative; border-radius: 18px; margin: 0 0 22px;
    overflow: hidden; user-select: none;
  }
  .gate-meme img { display: block; width: 100%; }
  .gate-meme .mt {
    position: absolute; left: 10px; right: 10px;
    font-family: Impact, 'Arial Black', 'Helvetica Neue', sans-serif;
    font-size: 23px; font-weight: 400; letter-spacing: 0.03em; text-transform: uppercase;
    color: #fff; -webkit-text-stroke: 1.2px #000;
    text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
  }
  .gate-meme .mt.top { top: 12px; }
  .gate-meme .mt.bot { bottom: 12px; }
  /* end meme experiment */

  .gate-err { font-size: 13px; font-weight: 600; color: #d43f3f; margin: 14px 0 0; min-height: 1.2em; visibility: hidden; }
  .gate-card.no .gate-err { visibility: visible; }
  .gate-card.no { animation: gate-shake .35s ease; }
  @keyframes gate-shake { 0%, 100% { transform: none; } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }

  @media (max-width: 860px) {
    .cs-meta { grid-template-columns: repeat(2, 1fr); row-gap: 26px; }
    .callouts, .outcomes, .hmw { grid-template-columns: 1fr; }
    .secnav a span { display: none; }
    .secnav a { padding-bottom: 10px; }
    .shot-row.n2, .shot-row.n3 { grid-template-columns: 1fr; }
    .flow { grid-template-columns: repeat(2, 1fr); row-gap: 20px; }
    .ch-split { grid-template-columns: 1fr; }
    .ch-split .shot { min-height: 0; aspect-ratio: 4 / 3; }
    h2 { max-width: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .rv { opacity: 1; transform: none; transition: none; }
  }
</style>
</head>
<body>

<header class="cs-bar" id="cs-bar">
  <div class="who" style="visibility:hidden">
    <span class="mark" id="bar-mark"></span>
    <span id="bar-org"></span>
    <span class="sep">·</span>
    <span class="proj" id="bar-proj"></span>
  </div>
  <a class="cs-close" href="index.html#s-work" aria-label="Close case study">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M6 6l12 12M18 6L6 18"/>
    </svg>
  </a>
</header>

<main id="cs"></main>

<div id="gate" hidden>
  <form class="gate-card" id="gate-form">
    <span class="lock" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="11" width="16" height="10" rx="2.5"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
      </svg>
    </span>
    <!-- meme security check — EXPERIMENT: delete this div (and its CSS block) to revert -->
    <div class="gate-meme" aria-hidden="true">
      <img src="images/prison-mike.png" alt="">
      <span class="mt top">You shall not pass</span>
      <span class="mt bot">without the password</span>
    </div>
    <h1>Security check</h1>
    <p>Enter the password to read the case studies. Don&rsquo;t have it? <a href="mailto:ajeet.kr646@gmail.com">Reach out</a> and I&rsquo;ll share it.</p>
    <div class="gate-row">
      <input type="password" name="password" placeholder="Password" autocomplete="off" aria-label="Password" required>
      <button type="submit" aria-label="Unlock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <p class="gate-err">That&rsquo;s not it &mdash; check the password and try again.</p>
  </form>
</div>

<script>
/* embedded in index.html's full-screen layer? then close = tell the parent */
var EMBED = new URLSearchParams(location.search).get('embed') === '1';

/* ─────────────────────────────────────────────────────────────────────────────
   One template, four case studies. Structure follows the reference:
   hero → meta → challenge → approach (sub-beats) → breakthrough → results
   (pull quote, flow, outcome cards) → next project.

   CONTENT IS NOT IN THIS FILE. It ships encrypted in cases.enc.json and the
   password is the decryption key (PBKDF2 → AES-GCM via Web Crypto). Edit copy
   in cases.src.mjs, then rebuild:  node encrypt-cases.mjs <password>
   ───────────────────────────────────────────────────────────────────────────── */
var KEY_STORE = 'cases-key-v1';

function b64d(s) { var b = atob(s), u = new Uint8Array(b.length); for (var i = 0; i < b.length; i++) u[i] = b.charCodeAt(i); return u; }
function b64e(buf) { var u = new Uint8Array(buf), s = ''; for (var i = 0; i < u.length; i++) s += String.fromCharCode(u[i]); return btoa(s); }

function decryptCases(meta, key) {
  return crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64d(meta.iv) }, key, b64d(meta.data))
    .then(function (plain) { return JSON.parse(new TextDecoder().decode(plain)); });
}
function keyFromPassword(meta, pw) {
  return crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey'])
    .then(function (base) {
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', hash: 'SHA-256', salt: b64d(meta.salt), iterations: meta.iter },
        base, { name: 'AES-GCM', length: 256 }, true, ['decrypt']);
    });
}

var gate = document.getElementById('gate');
var gateForm = document.getElementById('gate-form');

fetch('cases.enc.json', { cache: 'no-store' }).then(function (r) { return r.json(); }).then(function (meta) {
  var saved = sessionStorage.getItem(KEY_STORE);
  var stored = saved
    ? crypto.subtle.importKey('raw', b64d(saved), 'AES-GCM', false, ['decrypt'])
        .then(function (key) { return decryptCases(meta, key); })
    : Promise.reject();
  stored.then(render, function () {
    /* no key, or a stale one — ask for the password */
    sessionStorage.removeItem(KEY_STORE);
    gate.hidden = false;
    var input = gateForm.querySelector('input');
    input.focus();
    gateForm.addEventListener('submit', function (e) {
      e.preventDefault();
      gateForm.classList.remove('no');
      keyFromPassword(meta, input.value)
        .then(function (key) {
          /* AES-GCM authenticates — a wrong password fails here, nothing to compare */
          return decryptCases(meta, key).then(function (cases) {
            return crypto.subtle.exportKey('raw', key).then(function (raw) {
              sessionStorage.setItem(KEY_STORE, b64e(raw));
              gate.hidden = true;
              render(cases);
            });
          });
        })
        .catch(function () {
          input.select();
          void gateForm.offsetWidth; /* restart the shake animation */
          gateForm.classList.add('no');
        });
    });
  });
});

function render(CASES) {

var id = new URLSearchParams(location.search).get('id');
if (!CASES[id]) id = 'porter';
var c = CASES[id];

document.title = c.title + ' — Ajeet';
document.querySelector('.cs-bar .who').style.visibility = '';
var mark = document.getElementById('bar-mark');
mark.textContent = c.mark; mark.style.background = c.markBg;
document.getElementById('bar-org').textContent = c.org;
document.getElementById('bar-proj').textContent = c.proj;

function shot(s, grad, extra) {
  return '<div class="shot ' + grad + ' ' + (s[1] || '') + ' ' + (extra || '') + '" data-n="' + s[0] + '"></div>';
}

/* sections number themselves — cases can skip any of them */
var secNum = 0;
function kick(label) { return '0' + (++secNum) + ' — ' + label; }

var h = '';

/* hero + meta */
h += '<section class="cs-hero"><div class="wrap">' +
  '<span class="badge rv" style="background:' + c.markBg + '">' + c.mark + '</span>' +
  '<h1 class="rv">' + c.title + '</h1>' +
  '<p class="sub rv">' + c.sub + '</p>' +
  '<dl class="cs-meta rv">' + c.meta.map(function (m) {
    return '<div><dt>' + m[0] + '</dt><dd>' + m[1] + '</dd></div>';
  }).join('') + '</dl>' +
  '</div></section>';

/* challenge + problem share one renderer; split = copy left, image right */
function textSection(sec, fallbackK) {
  var head = '<p class="kicker rv">' + kick(sec.k || fallbackK) + '</p>';
  if (sec.blocks) {
    return '<section><div class="wrap">' + head + '<h2 class="rv">' + sec.h + '</h2>' + blocksHtml(sec.blocks) + '</div></section>';
  }
  var body = '<h2 class="rv">' + sec.h + '</h2>' +
    sec.p.map(function (p) { return '<p class="rv">' + p + '</p>'; }).join('');
  var fig = sec.shot
    ? '<figure class="figure rv">' + shot(sec.shot, c.grad, 'bleed') +
      '<figcaption>' + sec.shot[0] + '</figcaption></figure>'
    : '';
  if (sec.split) {
    return '<section><div class="wrap">' + head +
      '<div class="ch-split"><div>' + body + '</div>' + fig + '</div></div></section>';
  }
  if (sec.wide) {
    /* left-aligned copy, image running the full content width below */
    return '<section><div class="wrap">' + head +
      '<div class="wide-copy">' + body + '</div>' + fig + '</div></section>';
  }
  return '<section><div class="narrow">' + head + body + '</div>' +
    (fig ? '<div class="wrap">' + fig + '</div>' : '') + '</section>';
}

/* content blocks: paragraphs, image rows, insight + result callouts */
function blocksHtml(blocks) {
  var bh = '';
  blocks.forEach(function (b) {
    if (b.p) bh += '<div class="wide-copy"><p class="rv">' + b.p + '</p></div>';
    else if (b.quote) bh += '<blockquote class="bq rv">&ldquo;' + b.quote + '&rdquo;' +
      (b.cite ? '<cite>' + b.cite + '</cite>' : '') + '</blockquote>';
    else if (b.list) bh += '<ul class="blist rv">' + b.list.map(function (li) { return '<li>' + li + '</li>'; }).join('') + '</ul>';
    else if (b.insight) bh += '<aside class="insight rv">' + b.insight + '</aside>';
    else if (b.shots) bh += '<div class="shot-row n' + b.shots.length + '">' + b.shots.map(function (s) {
      return '<figure class="figure rv">' + shot(s, c.grad, 'bleed') + '<figcaption>' + s[0] + '</figcaption></figure>';
    }).join('') + '</div>';
    else if (b.result) {
      bh += '<div class="result-card rv"><span class="rk">Result</span>' +
        (Array.isArray(b.result)
          ? '<div class="rrow">' + b.result.map(function (r) { return '<span>' + r + '</span>'; }).join('') + '</div>'
          : '<p>' + b.result + '</p>') + '</div>';
    }
  });
  return bh;
}

h += textSection(c.challenge, 'The challenge');
if (c.problem) h += textSection(c.problem, 'The challenge');

/* approach — header aligns with the card row when one is present */
h += '<section><div class="' + (c.approachCards ? 'wrap' : 'narrow') + '"><p class="kicker rv">' + kick('The approach') + '</p>' +
  '<h2 class="rv">' + (c.approachH || 'How we got there') + '</h2>' +
  (c.approachIntro ? '<p class="rv">' + c.approachIntro + '</p>' : '') + '</div>';
if (c.approachCards) {
  /* how-might-we questions as a horizontal card row */
  h += '<div class="wrap"><div class="hmw rv">' + c.approachCards.map(function (card, i) {
    return '<div class="hmw-card"><span class="n">0' + (i + 1) + '</span><h3>' + card[0] + '</h3><p>' + card[1] + '</p></div>';
  }).join('') + '</div></div>';
}
if (c.approachOutro) {
  h += '<div class="wrap"><div class="ap-outro">' + [].concat(c.approachOutro).map(function (p) {
    return '<p class="rv">' + p + '</p>';
  }).join('') + '</div></div>';
}
/* problem walkthroughs — the approach, one problem at a time */
(c.problems || []).forEach(function (pr, i) {
  h += '<div class="wrap prob">' +
    '<h3 class="prob-h rv"><span>0' + (i + 1) + '</span>' + pr.h + '</h3>' +
    blocksHtml(pr.blocks) + '</div>';
});
(c.approach || []).forEach(function (a) {
  h += '<div class="step"><div class="narrow"><h3 class="rv">' + a.h + '</h3>' +
    (a.p ? '<p class="rv">' + a.p + '</p>' : '') + '</div>';
  if (a.callouts) {
    h += '<div class="narrow"><div class="callouts rv">' + a.callouts.map(function (co) {
      return '<div class="callout"><b>' + co[0] + '</b><span>' + co[1] + '</span></div>';
    }).join('') + '</div></div>';
  }
  if (a.shot) {
    h += '<div class="wrap"><figure class="figure rv">' + shot(a.shot, c.grad) +
      '<figcaption>' + a.shot[0] + '</figcaption></figure></div>';
  }
  h += '</div>';
});
h += '</section>';

/* solutions — one section per problem, any layout (split / wide / stacked) */
(c.solutions || []).forEach(function (s) { h += textSection(s, 'The solution'); });

/* breakthrough */
if (c.breakthrough) {
  h += '<section><div class="narrow">' +
    '<p class="kicker rv">' + kick('The breakthrough') + '</p>' +
    '<h2 class="rv">' + c.breakthrough.h + '</h2>' +
    '<p class="rv">' + c.breakthrough.p + '</p>' +
    '</div><div class="wrap"><figure class="figure rv">' + shot(c.breakthrough.shot, c.grad, 'bleed') +
    '<figcaption>' + c.breakthrough.shot[0] + '</figcaption></figure></div></section>';
}

/* quote */
if (c.quote) {
  h += '<div class="quote"><div class="narrow rv"><blockquote>&ldquo;' + c.quote[0] + '&rdquo;</blockquote>' +
    '<cite>' + c.quote[1] + '</cite></div></div>';
}

/* results: flow + outcomes */
if (c.flow || c.outcomes) {
  h += '<section><div class="narrow"><p class="kicker rv">' + kick('The results') + '</p>' +
    '<h2 class="rv">What shipped, and what it moved</h2></div>' +
    '<div class="wrap">' +
    (c.flow ? '<div class="flow rv">' + c.flow.map(function (f, i) {
      return '<div>' + shot([f[0], ''], c.grad) + '<p>' + (i + 1) + '. ' + f[0] + '<span>' + f[1] + '</span></p></div>';
    }).join('') + '</div>' : '') +
    (c.outcomes ? '<div class="outcomes rv">' + c.outcomes.map(function (o) {
      return '<div class="outcome"><p class="stat">' + o.stat + '</p><h3>' + o.h + '</h3><p>' + o.p + '</p></div>';
    }).join('') + '</div>' : '') +
    '</div></section>';
}

/* footer — just the way back, no next-project card */
h += '<footer class="cs-foot"><div class="wrap">' +
  '<a class="home" href="index.html#s-work">← Back to all work</a>' +
  '</div></footer>';

document.getElementById('cs').innerHTML = h;

/* section nav — built from the rendered kickers, sticks under the top bar */
var navSecs = [].slice.call(document.querySelectorAll('#cs section')).filter(function (s) { return s.querySelector('.kicker'); });
if (navSecs.length > 1) {
  var secnav = document.createElement('nav');
  secnav.className = 'secnav';
  secnav.setAttribute('aria-label', 'Case study sections');
  secnav.innerHTML = '<div class="wrap">' + navSecs.map(function (s, i) {
    s.id = 'sec' + (i + 1);
    var label = s.querySelector('.kicker').textContent.replace(/^\d+\s*—\s*/, '');
    var sub = s.querySelector('h2') ? s.querySelector('h2').textContent : '';
    return '<a href="#sec' + (i + 1) + '"><b>' + label + '</b><span>' + sub + '</span></a>';
  }).join('') + '</div>';
  document.getElementById('cs').insertBefore(secnav, navSecs[0]);
  secnav.style.top = document.getElementById('cs-bar').offsetHeight + 'px';
  var navLinks = [].slice.call(secnav.querySelectorAll('a'));
  var navTick = function () {
    var edge = secnav.getBoundingClientRect().bottom + 80;
    var cur = 0;
    navSecs.forEach(function (s, i) { if (s.getBoundingClientRect().top <= edge) cur = i; });
    navLinks.forEach(function (a, i) { a.classList.toggle('on', i === cur); });
  };
  addEventListener('scroll', navTick, { passive: true });
  navTick();
}

/* reveals + sticky bar border (rect-based, same pattern as the rest of the site) */
var rv = [].slice.call(document.querySelectorAll('.rv'));
var bar = document.getElementById('cs-bar');
function tick() {
  var vh = innerHeight;
  for (var i = rv.length - 1; i >= 0; i--) {
    var b = rv[i].getBoundingClientRect();
    if (b.top < vh * 0.9 && b.bottom > 0) { rv[i].classList.add('in'); rv.splice(i, 1); }
  }
  bar.classList.toggle('stuck', scrollY > 12);
}
addEventListener('scroll', tick, { passive: true });
tick();
setInterval(tick, 600);

if (EMBED) {
  /* "back to all work" dismisses the parent layer; next-case stays in it */
  var home = document.querySelector('.cs-foot .home');
  if (home) home.addEventListener('click', bubbleClose);
  var nx = document.querySelector('.next');
  if (nx) nx.setAttribute('href', nx.getAttribute('href') + '&embed=1');
}

}

/* the × and Escape dismiss the parent layer — must work even while the gate is up */
function bubbleClose(e) { e.preventDefault(); parent.postMessage('case:close', '*'); }
if (EMBED) {
  document.querySelector('.cs-close').addEventListener('click', bubbleClose);
  addEventListener('keydown', function (e) { if (e.key === 'Escape') parent.postMessage('case:close', '*'); });
}
</script>
</body>
</html>
