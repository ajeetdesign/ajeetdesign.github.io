<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Case study — Ajeet</title>
<meta name="description" content="Case study — product design work by Ajeet.">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="images/favicon-32.png">
<link rel="apple-touch-icon" href="images/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap">
<style>
  :root {
    --font: 'Sora', -apple-system, sans-serif;
    --ink-dark: #1c2b3a;
    --ink-soft: rgba(28, 43, 58, 0.72);
    --ink-faint: rgba(28, 43, 58, 0.5);
    --accent: #2f7fd4;
    --rule: rgba(28, 43, 58, 0.12);
    --page: #f7f9fc;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; font-family: var(--font); background: var(--page); color: var(--ink-dark);
    -webkit-font-smoothing: antialiased; overflow-x: hidden;
  }
  .wrap { width: min(92vw, 1080px); margin: 0 auto; }
  .narrow { width: min(92vw, 760px); margin: 0 auto; }

  /* ── top bar: project name + the × back to the journey ─────────────────── */
  .cs-bar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px clamp(16px, 3vw, 32px);
    background: rgba(247, 249, 252, 0.82);
    backdrop-filter: blur(14px) saturate(1.3);
    -webkit-backdrop-filter: blur(14px) saturate(1.3);
    border-bottom: 1px solid transparent;
    transition: border-color .3s ease;
  }
  .cs-bar.stuck { border-bottom-color: var(--rule); }
  .cs-bar .who { display: flex; align-items: center; gap: 12px; font-size: 14px; font-weight: 600; }
  .cs-bar .who .mark {
    width: 30px; height: 30px; border-radius: 9px; display: grid; place-items: center;
    color: #fff; font-size: 14px; font-weight: 800; letter-spacing: -0.02em;
  }
  .cs-bar .who .sep { color: var(--ink-faint); font-weight: 400; }
  .cs-bar .who .proj { color: var(--ink-soft); font-weight: 500; }
  .cs-close {
    width: 42px; height: 42px; border: 1px solid var(--rule); border-radius: 999px;
    background: #fff; cursor: pointer; display: grid; place-items: center; color: var(--ink-dark);
    transition: transform .35s cubic-bezier(.2,.9,.25,1), background .25s ease;
    text-decoration: none;
  }
  .cs-close:hover { background: var(--ink-dark); color: #fff; transform: rotate(90deg); }
  .cs-close svg { width: 17px; height: 17px; }

  /* ── hero ──────────────────────────────────────────────────────────────── */
  .cs-hero { padding: clamp(120px, 16vh, 180px) 0 clamp(40px, 6vh, 70px); text-align: center; }
  .cs-hero .badge {
    display: inline-grid; place-items: center; width: 54px; height: 54px; border-radius: 16px;
    color: #fff; font-size: 24px; font-weight: 800; letter-spacing: -0.03em; margin-bottom: 26px;
    box-shadow: 0 14px 34px -14px rgba(15, 30, 50, 0.55);
  }
  .cs-hero h1 {
    font-size: clamp(32px, 5vw, 62px); font-weight: 800; letter-spacing: -0.04em;
    line-height: 1.08; margin: 0 auto 22px; max-width: 18ch;
  }
  .cs-hero .sub { font-size: clamp(15px, 1.6vw, 19px); line-height: 1.65; color: var(--ink-soft); margin: 0 auto; max-width: 60ch; }

  /* meta row — role / timeline / team / platform */
  .cs-meta {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(16px, 3vw, 40px);
    padding: clamp(26px, 3.4vw, 38px) 0; margin-top: clamp(30px, 4vw, 48px);
    border-top: 1px solid var(--rule); border-bottom: 1px solid var(--rule);
    text-align: left;
  }
  .cs-meta dt { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 8px; }
  .cs-meta dd { margin: 0; font-size: clamp(14px, 1.4vw, 16px); font-weight: 600; line-height: 1.5; }

  /* ── image placeholders — swap each .shot for <img class="shot" src="…"> ─ */
  .shot {
    width: 100%; border-radius: 20px; border: 1px solid rgba(255,255,255,0.5);
    display: grid; place-items: center; overflow: hidden; object-fit: cover;
    aspect-ratio: 16 / 9;
    box-shadow: 0 30px 70px -40px rgba(15, 30, 50, 0.5);
  }
  div.shot::after {
    content: attr(data-n); font-size: 11px; font-weight: 700; letter-spacing: 0.2em;
    text-transform: uppercase; color: rgba(255,255,255,0.9); text-align: center; padding: 0 20px;
  }
  .shot.tall { aspect-ratio: 4 / 3; }
  .shot.bleed { border-radius: 24px; }
  .g1 { background: linear-gradient(135deg, #ffd8a6, #ff9d6c 55%, #f76b8a); }
  .g2 { background: linear-gradient(135deg, #a6d8ff, #6c9dff 55%, #7b6bf7); }
  .g3 { background: linear-gradient(135deg, #c3f0c8, #6cc9a4 55%, #3f9d8a); }
  .g4 { background: linear-gradient(135deg, #e8d5ff, #b98cf5 55%, #8a6bf7); }
  .g5 { background: linear-gradient(135deg, #cfe0f2, #8fa9c6 55%, #5b7796); }

  /* ── sections ──────────────────────────────────────────────────────────── */
  section { padding: clamp(56px, 9vh, 110px) 0; }
  .kicker {
    font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--accent); margin: 0 0 18px;
  }
  h2 {
    font-size: clamp(26px, 3.4vw, 42px); font-weight: 800; letter-spacing: -0.035em;
    line-height: 1.16; margin: 0 0 24px; max-width: 20ch;
  }
  h3 { font-size: clamp(19px, 2vw, 24px); font-weight: 700; letter-spacing: -0.025em; margin: 0 0 12px; }
  p { font-size: clamp(15px, 1.5vw, 17px); line-height: 1.75; color: var(--ink-soft); margin: 0 0 18px; }
  p:last-child { margin-bottom: 0; }
  p strong { font-weight: 600; color: var(--ink-dark); }
  .step { margin-top: clamp(44px, 6vw, 72px); }
  .figure { margin-top: clamp(24px, 3vw, 36px); }
  .figure figcaption { font-size: 13px; color: var(--ink-faint); margin-top: 12px; text-align: center; }

  /* three friction callouts */
  .callouts { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(12px, 1.6vw, 20px); margin-top: clamp(24px, 3vw, 34px); }
  .callout {
    background: #fff; border: 1px solid var(--rule); border-radius: 18px;
    padding: clamp(20px, 2.4vw, 28px);
  }
  .callout b { display: block; font-size: clamp(24px, 2.8vw, 34px); font-weight: 800; letter-spacing: -0.03em; color: var(--accent); margin-bottom: 8px; }
  .callout span { font-size: 14px; line-height: 1.6; color: var(--ink-soft); }

  /* pull quote */
  .quote { padding: clamp(50px, 8vh, 90px) 0; text-align: center; }
  .quote blockquote {
    margin: 0 auto; max-width: 22ch;
    font-size: clamp(26px, 4vw, 48px); font-weight: 700; letter-spacing: -0.035em; line-height: 1.2;
  }
  .quote cite { display: block; margin-top: 22px; font-size: 13px; font-style: normal; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink-faint); }

  /* the four-step flow */
  .flow { display: grid; grid-template-columns: repeat(4, 1fr); gap: clamp(10px, 1.4vw, 16px); margin-top: clamp(24px, 3vw, 36px); }
  .flow .shot { aspect-ratio: 3 / 4; border-radius: 16px; }
  .flow p { font-size: 13px; font-weight: 600; color: var(--ink-dark); margin: 12px 0 0; text-align: center; }
  .flow p span { display: block; font-weight: 400; color: var(--ink-faint); font-size: 12px; margin-top: 2px; }

  /* outcome cards */
  .outcomes { display: grid; grid-template-columns: repeat(3, 1fr); gap: clamp(12px, 1.6vw, 20px); margin-top: clamp(28px, 3.4vw, 40px); }
  .outcome {
    background: #fff; border: 1px solid var(--rule); border-radius: 20px; padding: clamp(22px, 2.4vw, 30px);
    transition: transform .4s cubic-bezier(.2,.9,.25,1), box-shadow .4s ease;
  }
  .outcome:hover { transform: translateY(-4px); box-shadow: 0 24px 50px -30px rgba(15, 30, 50, 0.5); }
  .outcome .stat { font-size: clamp(24px, 2.6vw, 32px); font-weight: 800; letter-spacing: -0.03em; margin: 0 0 10px; }
  .outcome h3 { font-size: 16px; margin: 0 0 6px; }
  .outcome p { font-size: 14px; line-height: 1.6; margin: 0; }

  /* ── footer: next project + back ────────────────────────────────────────── */
  .cs-foot { border-top: 1px solid var(--rule); padding: clamp(50px, 8vh, 90px) 0 clamp(40px, 6vh, 70px); }
  .cs-foot .lead { font-size: 12px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-faint); margin: 0 0 14px; }
  .next {
    display: flex; align-items: center; justify-content: space-between; gap: 20px;
    text-decoration: none; color: var(--ink-dark);
    padding: clamp(22px, 3vw, 34px); border-radius: 24px; background: #fff;
    border: 1px solid var(--rule);
    transition: transform .4s cubic-bezier(.2,.9,.25,1), box-shadow .4s ease;
  }
  .next:hover { transform: translateY(-3px); box-shadow: 0 24px 50px -30px rgba(15, 30, 50, 0.5); }
  .next .t { font-size: clamp(20px, 2.4vw, 30px); font-weight: 800; letter-spacing: -0.03em; }
  .next .o { font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-faint); margin-bottom: 6px; }
  .next svg { width: 22px; height: 22px; flex: none; transition: transform .35s cubic-bezier(.2,.9,.25,1); }
  .next:hover svg { transform: translateX(4px); }
  .cs-foot .home { display: block; margin-top: 28px; text-align: center; font-size: 13px; font-weight: 600; color: var(--ink-faint); text-decoration: none; }
  .cs-foot .home:hover { color: var(--ink-dark); }

  /* reveals */
  .rv { opacity: 0; transform: translateY(28px); transition: opacity .8s cubic-bezier(.2,.7,.2,1), transform .8s cubic-bezier(.2,.7,.2,1); }
  .rv.in { opacity: 1; transform: none; }

  @media (max-width: 860px) {
    .cs-meta { grid-template-columns: repeat(2, 1fr); row-gap: 26px; }
    .callouts, .outcomes { grid-template-columns: 1fr; }
    .flow { grid-template-columns: repeat(2, 1fr); row-gap: 20px; }
    h2 { max-width: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .rv { opacity: 1; transform: none; transition: none; }
  }
</style>
</head>
<body>

<header class="cs-bar" id="cs-bar">
  <div class="who">
    <span class="mark" id="bar-mark"></span>
    <span id="bar-org"></span>
    <span class="sep">·</span>
    <span class="proj" id="bar-proj"></span>
  </div>
  <a class="cs-close" href="index.html#s-work" aria-label="Close case study">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
      <path d="M6 6l12 12M18 6L6 18"/>
    </svg>
  </a>
</header>

<main id="cs"></main>

<script>
/* embedded in index.html's full-screen layer? then close = tell the parent */
var EMBED = new URLSearchParams(location.search).get('embed') === '1';

/* ─────────────────────────────────────────────────────────────────────────────
   One template, four case studies. Structure follows the reference:
   hero → meta → challenge → approach (sub-beats) → breakthrough → results
   (pull quote, flow, outcome cards) → next project.

   COPY AND IMAGES ARE PLACEHOLDERS — the narrative beats are scaffolded from
   what the site already says about each project. Replace `shots` with <img>
   and rewrite the prose with the real story, metrics and screens.
   ───────────────────────────────────────────────────────────────────────────── */
var CASES = {
  porter: {
    org: 'Porter', mark: 'P', markBg: '#2f6bff', grad: 'g1',
    proj: 'Rewards program',
    title: 'Improving conversion of a rewards program',
    sub: 'Rebuilding the rewards journey for driver-partners — clearer earning states, faster redemption, and a measurable lift in conversion.',
    meta: [['Role', 'Senior Product Designer'], ['Timeline', '2024 · 4 months'], ['Team', 'PM, 3 engineers, analyst'], ['Platform', 'Android · Driver app']],
    challenge: {
      h: 'Drivers were earning rewards they never redeemed',
      p: [
        'Porter\'s rewards program was built to keep driver-partners engaged — but the earning states were buried, the redemption flow took too many taps, and most drivers never saw the value they had accrued.',
        'The result was a program that cost money to run and moved none of the numbers it was meant to move. <strong>Redemption sat far below target</strong>, and support tickets asking "where are my points?" kept climbing.'
      ],
      shot: ['Before / after — the rewards home', 'tall']
    },
    approach: [
      { h: 'Listening to drivers first', p: 'Rode along with driver-partners and sat in on support calls. The mental model was simple — they wanted to know two things: what have I earned, and what can I get right now.', shot: ['Field research — driver interviews', ''] },
      { h: 'The friction was worse than we thought', callouts: [['6 taps', 'to reach a redemption from the home screen'], ['0 clarity', 'on how close a driver was to the next tier'], ['3 places', 'where the same balance was shown differently']] },
      { h: 'Three concepts, one bet', p: 'We explored a tiered dashboard, a card-based wallet, and a single always-visible earning strip. Testing pointed hard at the strip — drivers glance, they do not browse.', shot: ['Concept explorations', ''] }
    ],
    breakthrough: {
      h: 'Make the reward the first thing they see',
      p: 'Instead of a section drivers had to navigate to, the balance and the next unlock moved into the home surface — always visible, always one tap from redemption. Redemption itself collapsed from six steps to two.',
      shot: ['The redesigned earning strip', 'tall']
    },
    quote: ['Drivers finally know what they\'ve earned — without asking us.', 'Driver Operations Lead'],
    flow: [['Earn', 'Every trip updates the strip'], ['See', 'Progress to the next unlock'], ['Redeem', 'Two taps, no menu'], ['Confirm', 'Instant, with receipt']],
    outcomes: [
      { stat: '+34%', h: 'Redemption rate', p: 'More of the rewards budget reached the drivers it was meant for.' },
      { stat: '2 taps', h: 'Down from six', p: 'The redemption path collapsed into the home surface.' },
      { stat: '−41%', h: 'Support tickets', p: '"Where are my points?" stopped being a top-five contact driver.' }
    ],
    next: 'juspay'
  },

  juspay: {
    org: 'Juspay · Hyperswitch', mark: 'J', markBg: '#111827', grad: 'g2',
    proj: 'Volume-based routing',
    title: 'Volume-based payment routing, without touching code',
    sub: 'A visual way to split payment traffic across processors — percentages, priorities and fallbacks, configured by the people who own the business rules.',
    meta: [['Role', 'Product Designer'], ['Timeline', '2022 · 5 months'], ['Team', 'PM, 4 engineers'], ['Platform', 'Web · Merchant dashboard']],
    challenge: {
      h: 'Routing rules lived in code, and only engineers could change them',
      p: [
        'Merchants on Hyperswitch route payments across many processors — Stripe here, Adyen there — to balance cost, success rate and risk. But every change to that split meant a ticket, an engineer, and a deploy.',
        'Payments teams were making <strong>business decisions on engineering timelines</strong>. When a processor degraded at 2am, nobody could shift traffic away from it.'
      ],
      shot: ['Before — routing config as code', 'tall']
    },
    approach: [
      { h: 'Mapping how teams actually think about traffic', p: 'Payments ops don\'t think in JSON. They think in "send a quarter of this to Adyen, the rest to Stripe, and if Stripe fails, fall back." The interface had to speak that language.', shot: ['Rule-modelling workshop', ''] },
      { h: 'What made it hard', callouts: [['4 concepts', 'of routing collapsed into one screen'], ['100%', 'of splits must always add up — visibly'], ['1 mistake', 'in a rule can drop live revenue']] },
      { h: 'Percentages you can see', p: 'The core interaction became a distribution bar: drag to reallocate volume, and the numbers stay honest. Fallbacks hang off each connector as an explicit chain, not an implicit one.', shot: ['The volume distribution builder', ''] }
    ],
    breakthrough: {
      h: 'A rule you can read out loud',
      p: 'Every configuration renders back as a plain-language summary before it goes live — "40% Adyen, 60% Stripe, fall back to Authorize.net". If the sentence sounds wrong, the rule is wrong. That single affordance killed most of the fear of shipping a change.',
      shot: ['Rule summary + confirmation', 'tall']
    },
    quote: ['We can move traffic in a minute, not a sprint.', 'Merchant payments lead'],
    flow: [['Name', 'Describe the rule'], ['Split', 'Drag the volume'], ['Fallback', 'Chain the backups'], ['Ship', 'Read it, confirm it']],
    outcomes: [
      { stat: 'Minutes', h: 'Not sprints', p: 'Routing changes moved from an engineering ticket to a self-serve action.' },
      { stat: '0 deploys', h: 'To change a split', p: 'Business rules left the codebase entirely.' },
      { stat: 'Live', h: 'In Hyperswitch', p: 'Shipped as part of the open-source payments stack.' }
    ],
    next: 'vedantu'
  },

  vedantu: {
    org: 'Vedantu', mark: 'V', markBg: '#111827', grad: 'g3',
    proj: 'FinOps lender management',
    title: 'An ops platform that scales with the funnel',
    sub: 'Ranking lenders, distributing lead share and configuring education-loan flows — the internal tooling behind every financed enrolment.',
    meta: [['Role', 'Product Designer'], ['Timeline', '2021 · 3 months'], ['Team', 'PM, 3 engineers, ops'], ['Platform', 'Web · Internal console']],
    challenge: {
      h: 'The team ran a lending marketplace out of a spreadsheet',
      p: [
        'Every financed enrolment depended on which lender got the lead. That allocation — who ranks where, who gets what share — was managed by hand, in a sheet, by one team.',
        'It worked until it didn\'t. <strong>Lead share drifted, lenders were toggled on without limits</strong>, and nobody could see the funnel consequences until the month closed.'
      ],
      shot: ['Before — allocation by spreadsheet', 'tall']
    },
    approach: [
      { h: 'Shadowing the ops team', p: 'Sat with the people doing the allocation. The rules were real and sophisticated — they were just invisible to everyone else and impossible to audit.', shot: ['Ops workflow mapping', ''] },
      { h: 'What the tool had to guarantee', callouts: [['100/100', 'lead share must always balance'], ['Drag', 'to rank — the mental model already existed'], ['Every change', 'auditable, reversible, attributable']] },
      { h: 'Ranking you can drag', p: 'Lenders became a ranked list you reorder directly, with share as an editable number that refuses to exceed the total. Available lenders sit below, one toggle from active.', shot: ['Lender ranking + lead share', ''] }
    ],
    breakthrough: {
      h: 'Make the invisible rules visible',
      p: 'The platform stopped being a form and became a picture of the funnel: who is active, who is getting what, and what happens to the split the moment you change one number.',
      shot: ['The FinOps dashboard', 'tall']
    },
    quote: ['The rules finally live somewhere other than one person\'s head.', 'FinOps manager'],
    flow: [['Rank', 'Drag lenders in order'], ['Share', 'Split the 100'], ['Activate', 'Toggle from the pool'], ['Audit', 'Every change tracked']],
    outcomes: [
      { stat: '1 console', h: 'Replaced the sheet', p: 'Allocation moved into a system with rules, limits and history.' },
      { stat: 'Self-serve', h: 'For the ops team', p: 'No engineering involvement to onboard or re-rank a lender.' },
      { stat: 'Auditable', h: 'By default', p: 'Every share change is attributable and reversible.' }
    ],
    next: 'convin'
  },

  convin: {
    org: 'Convin.ai', mark: 'C', markBg: '#111827', grad: 'g4',
    proj: 'Conversation intelligence',
    title: 'Reviewing every conversation, not just a sample',
    sub: 'AI-assisted QA workflows that let support teams audit 100% of their calls — and act on what they find.',
    meta: [['Role', 'Product Designer'], ['Timeline', '2020 · 4 months'], ['Team', 'PM, 4 engineers, ML'], ['Platform', 'Web · QA console']],
    challenge: {
      h: 'Quality teams could only listen to 2% of calls',
      p: [
        'Support QA is sampling by necessity — a human can only review so many calls. Which means coaching is based on a sliver of reality, and the worst conversations usually go unheard.',
        'AI could score every call. But <strong>a score nobody trusts is worse than no score</strong> — the design problem was never the model, it was the evidence.'
      ],
      shot: ['Before — manual QA scorecards', 'tall']
    },
    approach: [
      { h: 'Auditing the auditors', p: 'Watched QA analysts work. They didn\'t want a verdict — they wanted the moment in the call that justified the verdict, in one click.', shot: ['QA analyst sessions', ''] },
      { h: 'Where trust broke', callouts: [['2%', 'of calls actually reviewed by a human'], ['0 evidence', 'behind an automated score'], ['1 bad flag', 'and the team stops believing the system']] },
      { h: 'Score, but show your work', p: 'Every AI judgement links to the transcript moment that produced it. Analysts confirm or overturn in place — and each correction teaches the model.', shot: ['Evidence-linked scoring', ''] }
    ],
    breakthrough: {
      h: 'The human stays the judge',
      p: 'The AI proposes; the analyst disposes. Framing the machine as a first-pass reviewer rather than an authority is what made the team willing to let it touch all 100% of the calls.',
      shot: ['The review console', 'tall']
    },
    quote: ['We stopped guessing which calls to listen to.', 'Head of Support Quality'],
    flow: [['Ingest', 'Every call, transcribed'], ['Score', 'AI first pass'], ['Review', 'Evidence in one click'], ['Coach', 'Act on the pattern']],
    outcomes: [
      { stat: '100%', h: 'Call coverage', p: 'Every conversation reviewed, not a 2% sample.' },
      { stat: 'In place', h: 'Corrections', p: 'Analysts overturn a score without leaving the call.' },
      { stat: 'Trusted', h: 'Because it shows evidence', p: 'No judgement appears without the moment that caused it.' }
    ],
    next: 'porter'
  }
};

var id = new URLSearchParams(location.search).get('id');
if (!CASES[id]) id = 'porter';
var c = CASES[id];
var esc = function (s) { return s; };

document.title = c.title + ' — Ajeet';
var mark = document.getElementById('bar-mark');
mark.textContent = c.mark; mark.style.background = c.markBg;
document.getElementById('bar-org').textContent = c.org;
document.getElementById('bar-proj').textContent = c.proj;

function shot(s, grad, extra) {
  return '<div class="shot ' + grad + ' ' + (s[1] || '') + ' ' + (extra || '') + '" data-n="' + s[0] + '"></div>';
}

var h = '';

/* hero + meta */
h += '<section class="cs-hero"><div class="wrap">' +
  '<span class="badge rv" style="background:' + c.markBg + '">' + c.mark + '</span>' +
  '<h1 class="rv">' + c.title + '</h1>' +
  '<p class="sub rv">' + c.sub + '</p>' +
  '<dl class="cs-meta rv">' + c.meta.map(function (m) {
    return '<div><dt>' + m[0] + '</dt><dd>' + m[1] + '</dd></div>';
  }).join('') + '</dl>' +
  '</div></section>';

/* challenge */
h += '<section><div class="narrow">' +
  '<p class="kicker rv">01 — The challenge</p>' +
  '<h2 class="rv">' + c.challenge.h + '</h2>' +
  c.challenge.p.map(function (p) { return '<p class="rv">' + p + '</p>'; }).join('') +
  '</div><div class="wrap"><figure class="figure rv">' + shot(c.challenge.shot, c.grad, 'bleed') +
  '<figcaption>' + c.challenge.shot[0] + '</figcaption></figure></div></section>';

/* approach */
h += '<section><div class="narrow"><p class="kicker rv">02 — The approach</p>' +
  '<h2 class="rv">How we got there</h2></div>';
c.approach.forEach(function (a) {
  h += '<div class="step"><div class="narrow"><h3 class="rv">' + a.h + '</h3>' +
    (a.p ? '<p class="rv">' + a.p + '</p>' : '') + '</div>';
  if (a.callouts) {
    h += '<div class="narrow"><div class="callouts rv">' + a.callouts.map(function (co) {
      return '<div class="callout"><b>' + co[0] + '</b><span>' + co[1] + '</span></div>';
    }).join('') + '</div></div>';
  }
  if (a.shot) {
    h += '<div class="wrap"><figure class="figure rv">' + shot(a.shot, c.grad) +
      '<figcaption>' + a.shot[0] + '</figcaption></figure></div>';
  }
  h += '</div>';
});
h += '</section>';

/* breakthrough */
h += '<section><div class="narrow">' +
  '<p class="kicker rv">03 — The breakthrough</p>' +
  '<h2 class="rv">' + c.breakthrough.h + '</h2>' +
  '<p class="rv">' + c.breakthrough.p + '</p>' +
  '</div><div class="wrap"><figure class="figure rv">' + shot(c.breakthrough.shot, c.grad, 'bleed') +
  '<figcaption>' + c.breakthrough.shot[0] + '</figcaption></figure></div></section>';

/* quote */
h += '<div class="quote"><div class="narrow rv"><blockquote>&ldquo;' + c.quote[0] + '&rdquo;</blockquote>' +
  '<cite>' + c.quote[1] + '</cite></div></div>';

/* results: flow + outcomes */
h += '<section><div class="narrow"><p class="kicker rv">04 — The results</p>' +
  '<h2 class="rv">What shipped, and what it moved</h2></div>' +
  '<div class="wrap"><div class="flow rv">' + c.flow.map(function (f, i) {
    return '<div>' + shot([f[0], ''], c.grad) + '<p>' + (i + 1) + '. ' + f[0] + '<span>' + f[1] + '</span></p></div>';
  }).join('') + '</div>' +
  '<div class="outcomes rv">' + c.outcomes.map(function (o) {
    return '<div class="outcome"><p class="stat">' + o.stat + '</p><h3>' + o.h + '</h3><p>' + o.p + '</p></div>';
  }).join('') + '</div></div></section>';

/* next project */
var n = CASES[c.next];
h += '<footer class="cs-foot"><div class="wrap">' +
  '<p class="lead rv">Next case study</p>' +
  '<a class="next rv" href="case.html?id=' + c.next + '">' +
  '<span><span class="o">' + n.org + '</span><br><span class="t">' + n.title + '</span></span>' +
  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h13M12 5l7 7-7 7"/></svg>' +
  '</a>' +
  '<a class="home" href="index.html#s-work">← Back to all work</a>' +
  '</div></footer>';

document.getElementById('cs').innerHTML = h;

/* reveals + sticky bar border (rect-based, same pattern as the rest of the site) */
var rv = [].slice.call(document.querySelectorAll('.rv'));
var bar = document.getElementById('cs-bar');
function tick() {
  var vh = innerHeight;
  for (var i = rv.length - 1; i >= 0; i--) {
    var b = rv[i].getBoundingClientRect();
    if (b.top < vh * 0.9 && b.bottom > 0) { rv[i].classList.add('in'); rv.splice(i, 1); }
  }
  bar.classList.toggle('stuck', scrollY > 12);
}
addEventListener('scroll', tick, { passive: true });
tick();
setInterval(tick, 600);

if (EMBED) {
  /* the × and "back to all work" dismiss the parent layer — no page load */
  function bubbleClose(e) { e.preventDefault(); parent.postMessage('case:close', '*'); }
  document.querySelector('.cs-close').addEventListener('click', bubbleClose);
  var home = document.querySelector('.cs-foot .home');
  if (home) home.addEventListener('click', bubbleClose);
  /* keep next-case links inside the layer */
  var nx = document.querySelector('.next');
  if (nx) nx.setAttribute('href', nx.getAttribute('href') + '&embed=1');
  addEventListener('keydown', function (e) { if (e.key === 'Escape') parent.postMessage('case:close', '*'); });
}
</script>
</body>
</html>
